apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-voice-agent.fullname" . }}-backend
  labels:
    {{- include "ai-voice-agent.backend.labels" . | nindent 4 }}
    {{- if .Values.kagenti.enabled }}
    kagenti.io/type: "agent"
    kagenti.io/framework: "LangGraph"
    kagenti.io/workload-type: "deployment"
    protocol.kagenti.io/a2a: ""
    {{- end }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "ai-voice-agent.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-voice-agent.backend.selectorLabels" . | nindent 8 }}
        {{- if .Values.kagenti.enabled }}
        kagenti.io/inject: "enabled"
        kagenti.io/spire: "enabled"
        kagenti.io/type: "agent"
        kagenti.io/client-registration-inject: "true"
        protocol.kagenti.io/a2a: ""
        {{- end }}
      {{- if .Values.kagenti.enabled }}
      annotations:
        kagenti.io/inbound-ports-exclude: "{{ .Values.backend.port }}"
      {{- end }}
    spec:
      {{- if .Values.kagenti.enabled }}
      serviceAccountName: {{ include "ai-voice-agent.fullname" . }}-backend
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
            {{- if .Values.kagenti.enabled }}
            - name: a2a
              containerPort: {{ .Values.kagenti.a2aPort }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.kagenti.enabled }}
            - name: KAGENTI_ENABLED
              value: "true"
            {{- end }}
            {{- range $key, $val := .Values.backend.env }}
            {{- if and (eq $key "MLFLOW_TRACKING_URI") (not $val) $.Values.mlflow.enabled }}
            - name: MLFLOW_TRACKING_URI
              value: {{ printf "http://%s-mlflow:%v" (include "ai-voice-agent.fullname" $) $.Values.mlflow.port | quote }}
            {{- else }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.guardrails.enabled }}
            - name: GUARDRAILS_URL
              value: {{ .Values.guardrails.url | quote }}
            {{- if .Values.guardrails.token }}
            - name: GUARDRAILS_TOKEN
              value: {{ .Values.guardrails.token | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.nemoGuardrails.enabled }}
            - name: NEMO_GUARDRAILS_URL
              value: {{ .Values.nemoGuardrails.url | quote }}
            {{- if .Values.nemoGuardrails.token }}
            - name: NEMO_GUARDRAILS_TOKEN
              value: {{ .Values.nemoGuardrails.token | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.creditCardTools.enabled }}
            - name: CREDIT_CARD_TOOLS_MCP_URL
              value: {{ printf "http://%s-credit-card-tools:%v/mcp" (include "ai-voice-agent.fullname" .) .Values.creditCardTools.port | quote }}
            {{- end }}
            {{- if or ((.Values.kagenti).echoServiceUrl) ((.Values.echoService).enabled) }}
            - name: ECHO_SERVICE_URL
              value: {{ (.Values.kagenti).echoServiceUrl | default (printf "http://%s-echo-service:%v" (include "ai-voice-agent.fullname" .) ((.Values.echoService).port | default 8090)) | quote }}
            {{- end }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-voice-agent.fullname" . }}-backend
                  key: API_KEY
            - name: TTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-voice-agent.fullname" . }}-backend
                  key: TTS_API_KEY
            - name: STT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-voice-agent.fullname" . }}-backend
                  key: STT_TOKEN
          {{- if .Values.kagenti.enabled }}
          volumeMounts:
            - name: svid-output
              mountPath: /spiffe
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if .Values.kagenti.enabled }}
          startupProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          {{- end }}
      {{- if .Values.kagenti.enabled }}
      volumes:
        - name: svid-output
          emptyDir: {}
      {{- end }}
