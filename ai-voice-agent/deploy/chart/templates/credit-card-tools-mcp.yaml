{{- if and .Values.creditCardTools.enabled .Values.kagenti.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: credit-card-tools-route
  labels:
    {{- include "ai-voice-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: credit-card-tools
spec:
  hostnames:
    - mcp.127-0-0-1.sslip.io
  parentRefs:
    - name: mcp-gateway
      namespace: gateway-system
  rules:
    - backendRefs:
        - name: {{ include "ai-voice-agent.fullname" . }}-credit-card-tools
          port: {{ .Values.creditCardTools.port }}
---
apiVersion: mcp.kagenti.com/v1alpha1
kind: MCPServerRegistration
metadata:
  name: credit-card-tools
  labels:
    {{- include "ai-voice-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: credit-card-tools
spec:
  toolPrefix: credit_card_
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: credit-card-tools-route
{{- end }}
