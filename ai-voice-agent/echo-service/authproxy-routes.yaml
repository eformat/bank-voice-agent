apiVersion: v1
kind: ConfigMap
metadata:
  name: authproxy-routes
  namespace: team1
data:
  routes.yaml: |
    # --- Passthrough exclusions (first-match-wins) ---

    # Cloud metadata service
    - host: "169.254.169.254"
      passthrough: true

    # Kubernetes API server (uses SA token, not user JWT)
    - host: "kubernetes*"
      passthrough: true
    - host: "10.96.0.1"
      passthrough: true

    # --- Catch-all: exchange everything else ---
    - host: "**"
      target_audience: "echo-service"
      token_scopes: "openid"
